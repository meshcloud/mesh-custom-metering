services:
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - metering-network

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./tests/monitoring/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - loki
    networks:
      - metering-network

  oci-platform:
    image: mesh-metering-oci:latest
    container_name: oci-platform
    environment:
      - MESHSTACK_MESHFED_URL=${MESHSTACK_MESHFED_URL}
      - MESHSTACK_KRAKEN_URL=${MESHSTACK_KRAKEN_URL}
      - MESHSTACK_API_USER=${MESHSTACK_API_USER}
      - MESHSTACK_API_SECRET=${MESHSTACK_API_SECRET}
      - OCI_TENANCY_OCID=${OCI_TENANCY_OCID}
      - OCI_USER_OCID=${OCI_USER_OCID}
      - OCI_FINGERPRINT=${OCI_FINGERPRINT}
      - OCI_KEY_FILE=/secrets/oci_api_key.pem
      - OCI_REGION=${OCI_REGION}
      - OCI_ROOT_COMPARTMENT_ID=${OCI_ROOT_COMPARTMENT_ID}
      - PLATFORM_ID=${OCI_PLATFORM_ID}
      - LOKI_URL=http://loki:3100
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ${OCI_KEY_FILE_HOST}:/secrets/oci_api_key.pem:ro
    depends_on:
      loki:
        condition: service_started
    networks:
      - metering-network

networks:
  metering-network:
    driver: bridge

volumes:
  grafana-data:

  tencent-platform:
    image: mesh-metering-tencent:latest
    container_name: tencent-platform
    environment:
      - MESHSTACK_MESHFED_URL=${MESHSTACK_MESHFED_URL}
      - MESHSTACK_KRAKEN_URL=${MESHSTACK_KRAKEN_URL}
      - MESHSTACK_API_USER=${MESHSTACK_API_USER}
      - MESHSTACK_API_SECRET=${MESHSTACK_API_SECRET}
      - TENCENT_API_HOST=${TENCENT_API_HOST}
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY}
      - PLATFORM_ID=${TENCENT_PLATFORM_ID}
      - LOKI_URL=http://loki:3100
    depends_on:
      loki:
        condition: service_started
    networks:
      - metering-network

  ionos-platform:
    image: mesh-metering-ionos:latest
    container_name: ionos-platform
    environment:
      - MESHSTACK_MESHFED_URL=${MESHSTACK_MESHFED_URL}
      - MESHSTACK_KRAKEN_URL=${MESHSTACK_KRAKEN_URL}
      - MESHSTACK_API_USER=${MESHSTACK_API_USER}
      - MESHSTACK_API_SECRET=${MESHSTACK_API_SECRET}
      - IONOS_API_HOST=${IONOS_API_HOST}
      - IONOS_API_TOKEN=${IONOS_API_TOKEN}
      - PLATFORM_ID=${IONOS_PLATFORM_ID}
      - LOKI_URL=http://loki:3100
    depends_on:
      loki:
        condition: service_started
    networks:
      - metering-network

  stackit-platform:
    image: mesh-metering-stackit:latest
    container_name: stackit-platform
    environment:
      - MESHSTACK_MESHFED_URL=${MESHSTACK_MESHFED_URL}
      - MESHSTACK_KRAKEN_URL=${MESHSTACK_KRAKEN_URL}
      - MESHSTACK_API_USER=${MESHSTACK_API_USER}
      - MESHSTACK_API_SECRET=${MESHSTACK_API_SECRET}
      - STACKIT_API_HOST=${STACKIT_API_HOST}
      - STACKIT_API_TOKEN=${STACKIT_API_TOKEN}
      - PLATFORM_ID=${STACKIT_PLATFORM_ID}
      - LOKI_URL=http://loki:3100
    depends_on:
      loki:
        condition: service_started
    networks:
      - metering-network

   ovh-platform:
     image: mesh-metering-ovh:latest
     container_name: ovh-platform
     environment:
       - MESHSTACK_MESHFED_URL=${MESHSTACK_MESHFED_URL}
       - MESHSTACK_KRAKEN_URL=${MESHSTACK_KRAKEN_URL}
       - MESHSTACK_API_USER=${MESHSTACK_API_USER}
       - MESHSTACK_API_SECRET=${MESHSTACK_API_SECRET}
       - OVH_API_HOST=${OVH_API_HOST}
       - OVH_APPLICATION_KEY=${OVH_APPLICATION_KEY}
       - OVH_APPLICATION_SECRET=${OVH_APPLICATION_SECRET}
       - OVH_CONSUMER_KEY=${OVH_CONSUMER_KEY}
       - PLATFORM_ID=${OVH_PLATFORM_ID}
       - LOKI_URL=http://loki:3100
     depends_on:
       loki:
         condition: service_started
     networks:
       - metering-network

   gcp-platform:
     image: mesh-metering-gcp:latest
     container_name: gcp-platform
     environment:
       - MESHSTACK_MESHFED_URL=${MESHSTACK_MESHFED_URL}
       - MESHSTACK_KRAKEN_URL=${MESHSTACK_KRAKEN_URL}
       - MESHSTACK_API_USER=${MESHSTACK_API_USER}
       - MESHSTACK_API_SECRET=${MESHSTACK_API_SECRET}
       - GCP_SERVICE_ACCOUNT_JSON=${GCP_SERVICE_ACCOUNT_JSON}
       - GCP_BILLING_DATASET=${GCP_BILLING_DATASET}
       - GCP_COST_TYPE=${GCP_COST_TYPE:-cost}
       - PLATFORM_ID=${GCP_PLATFORM_ID}
       - LOKI_URL=http://loki:3100
     depends_on:
       loki:
         condition: service_started
     networks:
       - metering-network
