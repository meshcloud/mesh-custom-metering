name: GCP Platform CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'platforms/gcp/**'
      - 'src/core/**'
      - 'tests/gcp/**'
      - '.github/workflows/ci-platform-gcp.yml'
  pull_request:
    paths:
      - 'platforms/gcp/**'
      - 'src/core/**'
      - 'tests/gcp/**'

env:
  PLATFORM_NAME: gcp
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mesh-metering-gcp

jobs:
  test:
    name: Test GCP Platform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install core dependencies
        working-directory: src/core
        run: |
          pip install -r requirements.txt

      - name: Install platform dependencies
        working-directory: platforms/gcp
        run: |
          pip install -r requirements.txt

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov pytest-mock

      - name: Run GCP platform tests
        working-directory: tests/gcp
        run: |
          pytest test_gcp_integration.py -v --cov=../../platforms/gcp/main --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./tests/gcp/coverage.xml
          flags: gcp
          name: gcp-platform

  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./platforms/gcp/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
