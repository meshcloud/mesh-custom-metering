name: Tencent Platform CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'platforms/tencent/**'
      - 'src/core/**'
      - '.github/workflows/ci-platform-tencent.yml'
  pull_request:
    paths:
      - 'platforms/tencent/**'
      - 'src/core/**'

env:
  PLATFORM_NAME: tencent
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mesh-metering-tencent

jobs:
  test:
    name: Test Tencent Platform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: platforms/tencent
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run unit tests
        working-directory: platforms/tencent
        run: |
          pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./platforms/tencent/coverage.xml
          flags: tencent
          name: tencent-platform

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start mock services
        run: |
          docker-compose up -d meshstack-mock tencent-mock

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080/health; do sleep 2; done'

      - name: Build Tencent container
        run: |
          docker build -f platforms/tencent/Dockerfile -t test-tencent:latest .

      - name: Run integration test
        run: |
          docker run --network host \
            -e MESH_API_URL=http://localhost:8080 \
            -e MESH_API_USER=test-user \
            -e MESH_API_SECRET=test-secret \
            -e TENCENT_API_URL=http://localhost:8081 \
            -e TENCENT_SECRET_ID=test \
            -e TENCENT_SECRET_KEY=test \
            -e PLATFORM_ID=tencent.test \
            -e LOCAL_TESTING=true \
            test-tencent:latest

      - name: Verify results
        run: |
          REPORTS=$(curl -s http://localhost:8080/api/test/reports | jq length)
          if [ "$REPORTS" -eq 0 ]; then
            echo "❌ No usage reports submitted!"
            exit 1
          fi
          echo "✅ $REPORTS usage reports submitted successfully"

      - name: Show logs
        if: always()
        run: docker-compose logs

      - name: Cleanup
        if: always()
        run: docker-compose down -v

  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./platforms/tencent/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
