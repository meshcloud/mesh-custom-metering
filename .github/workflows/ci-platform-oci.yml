name: OCI Platform CI

on:
  push:
    branches: [main, develop]
    paths:
      - "platforms/oci/**"
      - "src/core/**"
      - ".github/workflows/ci-platform-oci.yml"
  pull_request:
    paths:
      - "platforms/oci/**"
      - "src/core/**"

env:
  PLATFORM_NAME: oci
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mesh-metering-oci

jobs:
  test:
    name: Test OCI Platform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: platforms/oci
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run unit tests
        working-directory: platforms/oci
        run: |
          pytest tests/ -v --cov=src --cov-report=xml || echo "No tests found yet"

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./platforms/oci/coverage.xml
          flags: oci
          name: oci-platform

  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./platforms/oci/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
