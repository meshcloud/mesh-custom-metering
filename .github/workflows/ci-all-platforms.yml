name: All Platforms CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  detect-changes:
    name: Detect Changed Platforms
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for platform changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tencent:
              - 'platforms/tencent/**'
              - 'src/core/**'
            ionos:
              - 'platforms/ionos/**'
              - 'src/core/**'
            stackit:
              - 'platforms/stackit/**'
              - 'src/core/**'
            ovh:
              - 'platforms/ovh/**'
              - 'src/core/**'

  build-and-test:
    name: Build ${{ matrix.platform }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.platforms != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.detect-changes.outputs.platforms) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/mesh-metering-${{ matrix.platform }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./platforms/${{ matrix.platform }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          platforms: linux/amd64,linux/arm64
