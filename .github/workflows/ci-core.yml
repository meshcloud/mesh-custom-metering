name: Core Library CI

on:
  push:
    paths:
      - 'src/core/**'
      - 'tests/core/**'
      - 'requirements-core.txt'
      - '.github/workflows/ci-core.yml'
  pull_request:
    paths:
      - 'src/core/**'
      - 'tests/core/**'
      - 'requirements-core.txt'

jobs:
  test-core:
    name: Test Core Library
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run tests
        run: |
          pytest tests/core/ -v --cov=src/core --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: core
          name: core-${{ matrix.python-version }}

  lint:
    name: Lint Core Library
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install ruff black mypy

      - name: Run ruff
        run: ruff check src/core/

      - name: Check formatting with black
        run: black --check src/core/

      - name: Type check with mypy
        run: mypy src/core/ --ignore-missing-imports
