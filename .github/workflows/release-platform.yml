name: Release Platform

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to release'
        required: true
        type: choice
        options:
          - tencent
          - ionos
          - stackit
          - ovh
          - all
      version:
        description: 'Version (e.g., 1.2.3)'
        required: true
        type: string

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    steps:
      - name: Validate semantic version
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Use semantic versioning (e.g., 1.2.3)"
            exit 1
          fi

  release-single:
    name: Release ${{ inputs.platform }}
    needs: validate-version
    if: inputs.platform != 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./platforms/${{ inputs.platform }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/mesh-metering-${{ inputs.platform }}:${{ inputs.version }}
            ghcr.io/${{ github.repository }}/mesh-metering-${{ inputs.platform }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.platform }}-v${{ inputs.version }}
          name: ${{ inputs.platform }} v${{ inputs.version }}
          body: |
            ## ${{ inputs.platform }} Platform Release v${{ inputs.version }}
            
            ### Container Image
            ```
            ghcr.io/${{ github.repository }}/mesh-metering-${{ inputs.platform }}:${{ inputs.version }}
            ```
            
            ### Pull the image
            ```bash
            docker pull ghcr.io/${{ github.repository }}/mesh-metering-${{ inputs.platform }}:${{ inputs.version }}
            ```
          draft: false
          prerelease: false

  release-all:
    name: Release All Platforms
    needs: validate-version
    if: inputs.platform == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    strategy:
      matrix:
        platform: [tencent, ionos, stackit, ovh]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./platforms/${{ matrix.platform }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/mesh-metering-${{ matrix.platform }}:${{ inputs.version }}
            ghcr.io/${{ github.repository }}/mesh-metering-${{ matrix.platform }}:latest
          platforms: linux/amd64,linux/arm64
